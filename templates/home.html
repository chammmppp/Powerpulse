{% extends 'base.html' %}
{% load static %}
{% block content %}
    <!-- Main Content Section -->
    <main class="main-content my-5">
        <!-- Introduction Banner -->
        <section class="section-intro" style="padding-top: 20px; padding-bottom: 20px;">
            <div class="container">
                <div class="intro-banner-wrap">
                    <img class="img-fluid rounded"
                         src="{% static 'images/banner.jpg' %}"
                         alt="Healthy Asian woman doing squats">
                </div>
            </div>
        </section>
        <!-- End Introduction Banner -->

        <!-- Popular Products Section -->
        <section class="products">

                </div>
                <!-- Product Cards -->
                <div class="row mt-3">
                    <!-- Product 1 -->
                    <div class="col-md-3">
                        <a href="/detailProduct.html">
                            <div class="card card-product">
                                <img class="rounded-top" src="{% static 'images/image-products/1.jpg' %}"
                                     alt="Blue shirt">
                                <div class="card-body">
                                    <p class="card-text">Some text in here</p>
                                    <div class="product-price-wrapper"
                                         style="border-top:1px solid #e4e4e4; padding-top: 16px;">
                                        <var class="price">&#3647;12</var>
                                        <a href="/cart.html"
                                           class="btn btn-outline-primary btn-sm float-end btn-add-to-cart">Add to
                                            cart</a>
                                    </div>
                                </div>
                            </div>
                        </a>
                    </div>

                    <!-- Product 2 -->
